[pytest]
pythonpath = .
testpaths = tests
addopts = -v --tb=short --html=reports/report.html --self-contained-html
markers =
    working: Tests currently being developed or verified
    do_not_run: Tests not yet ready to run
    login: Login-related scenarios
    cart: Cart-related scenarios
    regression: Regression test suite
    positive: Positive/happy-path scenarios
